<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios y Hobbies Musicales</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Gestión de Usuarios y Hobbies</h1>
    </header>

    <main>
        <!-- Sección del Formulario -->
        <section class="form-section">
            <h2>Registrar Nuevo Usuario</h2>
            <form id="user-form">
                <div class="form-group">
                    <label for="fullName">Nombre Completo:</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Ej. Juan Pérez">
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
                </div>

                <div class="form-group">
                    <label for="musicType">Tipo de Música que le gusta:</label>
                    <input type="text" id="musicType" name="musicType" required
                        placeholder="Ej. Rock, Electrónica, Jazz">
                </div>

                <button type="submit" id="submit-btn">Guardar Registro</button>
            </form>
        </section>

        <!-- Sección de la Tabla / Lista de Usuarios -->
        <section class="list-section">
            <h2>Usuarios Registrados</h2>
            <div class="table-container">
                <table id="users-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Música Favorita</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
